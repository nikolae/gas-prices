<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="300" />
  <title>Local Gas Prices</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1/Sortable.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    header {
      max-width: 960px;
      margin: 0 auto 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    h1 { font-size: 1.6rem; font-weight: 700; color: #f8fafc; }

    .meta { font-size: 0.8rem; color: #64748b; display: flex; align-items: center; gap: 0.75rem; }
    .meta a { color: #3b82f6; text-decoration: none; }
    .meta a:hover { text-decoration: underline; }

    .btn-add {
      background: #1d4ed8;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.35rem 0.85rem;
      font-size: 0.82rem;
      cursor: pointer;
    }
    .btn-add:hover { background: #2563eb; }

    /* Modal */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }

    .modal {
      background: #1e2330;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 1.5rem;
      width: 100%;
      max-width: 360px;
    }

    .modal h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: #f1f5f9; }
    .modal label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 0.25rem; }

    .modal input {
      width: 100%;
      background: #0f1117;
      border: 1px solid #374151;
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      color: #e2e8f0;
      font-size: 0.9rem;
      margin-bottom: 0.85rem;
    }
    .modal input:focus { outline: none; border-color: #3b82f6; }

    .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }

    .btn-cancel {
      background: transparent;
      border: 1px solid #374151;
      color: #94a3b8;
      border-radius: 6px;
      padding: 0.4rem 0.85rem;
      font-size: 0.82rem;
      cursor: pointer;
    }

    .btn-save {
      background: #1d4ed8;
      border: none;
      color: #fff;
      border-radius: 6px;
      padding: 0.4rem 0.85rem;
      font-size: 0.82rem;
      cursor: pointer;
    }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

    .modal-error {
      font-size: 0.78rem;
      color: #f87171;
      margin-bottom: 0.75rem;
      display: none;
    }

    /* Cards */
    .grid {
      max-width: 960px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: #1e2330;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
    }

    .card.error { border-color: #7f1d1d; background: #1c1010; }

    .card-header {
      margin-bottom: 1rem;
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
    }

    .drag-handle {
      color: #334155;
      cursor: grab;
      font-size: 1rem;
      line-height: 1.3;
      flex-shrink: 0;
      user-select: none;
    }
    .drag-handle:active { cursor: grabbing; }

    .card-header-text { flex: 1; }

    .station-name {
      font-size: 1.05rem;
      font-weight: 600;
      color: #f1f5f9;
      line-height: 1.3;
    }

    .cached-at {
      font-size: 0.72rem;
      color: #475569;
      margin-top: 0.15rem;
      min-height: 1em;
    }

    .btn-remove {
      background: none;
      border: none;
      color: #475569;
      font-size: 1rem;
      cursor: pointer;
      line-height: 1;
      padding: 0;
      flex-shrink: 0;
    }
    .btn-remove:hover { color: #f87171; }

    .sortable-ghost { opacity: 0.3; }

    /* Skeleton loading */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }

    .skeleton {
      background: linear-gradient(90deg, #252d3d 25%, #2d3748 50%, #252d3d 75%);
      background-size: 400px 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }

    .skeleton-row {
      height: 40px;
      margin-bottom: 0.5rem;
    }

    .skeleton-row:last-child { margin-bottom: 0; }

    /* Prices */
    .prices { display: flex; flex-direction: column; gap: 0.5rem; }

    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.45rem 0.75rem;
      background: #252d3d;
      border-radius: 8px;
    }

    .grade { font-size: 0.85rem; color: #94a3b8; }

    .price-value {
      font-size: 1.15rem;
      font-weight: 700;
      color: #4ade80;
      font-variant-numeric: tabular-nums;
    }

    .no-prices { font-size: 0.85rem; color: #475569; padding: 0.5rem 0; }
    .error-msg { font-size: 0.85rem; color: #f87171; padding: 0.5rem 0; }

    /* Chart */
    .chart-wrap {
      margin-top: 1rem;
      padding-top: 1rem;
      padding-bottom: 0.5rem;
      border-top: 1px solid #2d3748;
      height: 280px;
      position: relative;
    }

    .chart-days {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 0.6rem;
      justify-content: flex-end;
    }

    .chart-days button {
      background: #252d3d;
      border: 1px solid #374151;
      color: #94a3b8;
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      cursor: pointer;
    }

    .chart-days button.active {
      background: #1d4ed8;
      border-color: #1d4ed8;
      color: #fff;
    }

    .chart-loading {
      font-size: 0.75rem;
      color: #475569;
      text-align: center;
      padding: 1rem 0;
    }

    footer {
      max-width: 960px;
      margin: 2rem auto 0;
      font-size: 0.75rem;
      color: #334155;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <h1>⛽ Local Gas Prices</h1>
  <div class="meta">
    Auto-refreshes every 5 min &nbsp;·&nbsp;
    <a href="/refresh">Force refresh</a>
    <button class="btn-add" onclick="openModal()">+ Add Station</button>
  </div>
</header>

<!-- Add station modal -->
<div class="modal-backdrop" id="modal" onclick="closeOnBackdrop(event)">
  <div class="modal">
    <h2>Add Station</h2>
    <div class="modal-error" id="modal-error"></div>
    <label for="inp-id">GasBuddy Station ID</label>
    <input id="inp-id" type="text" placeholder="e.g. 44946" inputmode="numeric" />
    <label for="inp-nick">Nickname</label>
    <input id="inp-nick" type="text" placeholder="e.g. Costco North" />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="btn-save" onclick="addStation()">Add</button>
    </div>
  </div>
</div>

<div class="grid" id="grid">
  {% for station in stations %}
  <div class="card" data-id="{{ station.id }}">
    <div class="card-header">
      <span class="drag-handle" title="Drag to reorder">⠿</span>
      <div class="card-header-text">
        <div class="station-name">{{ station.nickname }}</div>
        <div class="cached-at" id="age-{{ station.id }}"></div>
      </div>
      <button class="btn-remove" title="Remove station" onclick="removeStation('{{ station.id }}', this)">✕</button>
    </div>

    <div id="prices-{{ station.id }}">
      <!-- Skeleton shown while prices load -->
      <div class="skeleton skeleton-row"></div>
      <div class="skeleton skeleton-row"></div>
    </div>

    <div class="chart-wrap" id="chart-wrap-{{ station.id }}" style="display:none">
      <div class="chart-days">
        <button onclick="loadChart('{{ station.id }}', 1, this)">1d</button>
        <button onclick="loadChart('{{ station.id }}', 7, this)" class="active">7d</button>
        <button onclick="loadChart('{{ station.id }}', 30, this)">30d</button>
      </div>
      <div id="loading-{{ station.id }}" class="chart-loading">Loading history…</div>
      <canvas id="chart-{{ station.id }}" style="display:none"></canvas>
    </div>
  </div>
  {% endfor %}
</div>

<footer>
  Prices sourced from GasBuddy &nbsp;·&nbsp; Page auto-refreshes every 5 minutes
</footer>

<script>
const GRADE_COLORS = {
  Regular:  '#4ade80',
  Midgrade: '#facc15',
  Premium:  '#fb923c',
  Diesel:   '#60a5fa',
  E85:      '#c084fc',
};

const _charts = {};

async function loadChart(stationId, days, btn) {
  btn.closest('.chart-days').querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const loading = document.getElementById(`loading-${stationId}`);
  const canvas  = document.getElementById(`chart-${stationId}`);

  loading.style.display = 'block';
  canvas.style.display  = 'none';

  let data;
  try {
    const res = await fetch(`/api/history/${stationId}?days=${days}`);
    data = await res.json();
  } catch {
    loading.textContent = 'Could not load history.';
    return;
  }

  const grades = Object.keys(data);
  if (!grades.length) {
    loading.textContent = 'No history yet — check back after prices are fetched.';
    return;
  }

  loading.style.display = 'none';
  canvas.style.display  = 'block';

  const datasets = grades.map(grade => ({
    label: grade,
    data: data[grade].map(p => ({ x: p.time, y: p.price })),
    borderColor: GRADE_COLORS[grade] || '#94a3b8',
    backgroundColor: 'transparent',
    borderWidth: 2,
    pointRadius: 2,
    tension: 0.3,
  }));

  if (_charts[stationId]) _charts[stationId].destroy();

  _charts[stationId] = new Chart(canvas, {
    type: 'line',
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'top',
          align: 'start',
          labels: { color: '#94a3b8', boxWidth: 8, boxHeight: 8, padding: 8, font: { size: 10 } },
        },
        tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: $${ctx.parsed.y.toFixed(3)}` } },
      },
      scales: {
        x: {
          type: 'time',
          time: {
            tooltipFormat: 'MMM d, h:mm a',
            displayFormats: {
              minute: 'h:mm a',
              hour: 'h a',
              day: 'MMM d',
              week: 'MMM d',
              month: 'MMM',
            },
          },
          ticks: {
            color: '#475569',
            maxTicksLimit: 5,
            autoSkip: true,
            font: { size: 10 },
          },
          grid: { color: '#1e2a3a' },
        },
        y: {
          ticks: { color: '#475569', font: { size: 10 }, callback: v => '$' + v.toFixed(2) },
          grid: { color: '#1e2a3a' },
        },
      },
    },
  });
}

// --- Prices ---
function formatAge(cachedAt) {
  const mins = Math.floor((Date.now() / 1000 - cachedAt) / 60);
  return mins < 1 ? 'Just updated' : `Updated ${mins} min ago`;
}

function renderPrices(stationId, data) {
  const card = document.querySelector(`[data-id="${stationId}"]`);
  const pricesEl = document.getElementById(`prices-${stationId}`);
  const ageEl    = document.getElementById(`age-${stationId}`);
  const wrapEl   = document.getElementById(`chart-wrap-${stationId}`);

  ageEl.textContent = formatAge(data.cached_at);

  if (data.error) {
    card.classList.add('error');
    pricesEl.innerHTML = '<div class="error-msg">Could not fetch prices — check station ID or network.</div>';
    return;
  }

  if (!data.prices.length) {
    pricesEl.innerHTML = '<div class="no-prices">No price data available.</div>';
    return;
  }

  pricesEl.innerHTML = '<div class="prices">' +
    data.prices.map(p =>
      `<div class="price-row">
        <span class="grade">${p.grade}</span>
        <span class="price-value">$${p.price.toFixed(3)}</span>
      </div>`
    ).join('') +
  '</div>';

  wrapEl.style.display = 'block';
  loadChart(stationId, 7, wrapEl.querySelector('button.active'));
}

async function loadAllPrices() {
  try {
    const res  = await fetch('/api/prices');
    const data = await res.json();
    Object.entries(data).forEach(([id, info]) => renderPrices(id, info));
  } catch (e) {
    document.querySelectorAll('.skeleton').forEach(el => {
      el.classList.remove('skeleton');
      el.textContent = 'Could not load prices.';
    });
  }
}

// --- Card ordering ---
const STORAGE_KEY = 'gas-prices-order';

function saveOrder() {
  const ids = [...document.querySelectorAll('.grid .card')].map(c => c.dataset.id);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(ids));
}

function applyOrder() {
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  if (!saved.length) return;
  const grid = document.getElementById('grid');
  saved.forEach(id => {
    const card = grid.querySelector(`[data-id="${id}"]`);
    if (card) grid.appendChild(card);
  });
}

// --- Modal ---
function openModal() {
  document.getElementById('inp-id').value = '';
  document.getElementById('inp-nick').value = '';
  document.getElementById('modal-error').style.display = 'none';
  document.getElementById('modal').classList.add('open');
  document.getElementById('inp-id').focus();
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function closeOnBackdrop(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

async function addStation() {
  const id    = document.getElementById('inp-id').value.trim();
  const nick  = document.getElementById('inp-nick').value.trim();
  const errEl = document.getElementById('modal-error');
  const saveBtn = document.getElementById('btn-save');

  errEl.style.display = 'none';
  if (!id) {
    errEl.textContent = 'Station ID is required.';
    errEl.style.display = 'block';
    return;
  }

  saveBtn.disabled = true;
  saveBtn.textContent = 'Adding…';

  try {
    const res  = await fetch('/api/stations', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, nickname: nick }),
    });
    const data = await res.json();
    if (!res.ok) {
      errEl.textContent = data.error || 'Something went wrong.';
      errEl.style.display = 'block';
      return;
    }
    closeModal();
    location.reload();
  } catch {
    errEl.textContent = 'Network error — try again.';
    errEl.style.display = 'block';
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = 'Add';
  }
}

async function removeStation(stationId, btn) {
  if (!confirm('Remove this station?')) return;
  const res = await fetch(`/api/stations/${stationId}`, { method: 'DELETE' });
  if (res.ok) {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    localStorage.setItem(STORAGE_KEY, JSON.stringify(saved.filter(id => id !== stationId)));
    btn.closest('.card').remove();
  }
}

document.addEventListener('DOMContentLoaded', () => {
  applyOrder();

  Sortable.create(document.getElementById('grid'), {
    handle: '.drag-handle',
    animation: 150,
    ghostClass: 'sortable-ghost',
    onEnd: saveOrder,
  });

  loadAllPrices();
});
</script>

</body>
</html>
