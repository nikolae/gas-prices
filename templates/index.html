<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="300" />
  <title>Local Gas Prices</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1/Sortable.min.js"></script>
  <!-- Apply saved theme immediately to prevent flash -->
  <script>
    (function() {
      const saved = localStorage.getItem('gas-prices-theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
    })();
  </script>
  <style>
    /* --- Theme variables --- */
    :root {
      --bg:             #0f1117;
      --bg-card:        #1e2330;
      --bg-card-error:  #1c1010;
      --bg-row:         #252d3d;
      --bg-input:       #0f1117;
      --border:         #2d3748;
      --border-error:   #7f1d1d;
      --border-input:   #374151;
      --text:           #e2e8f0;
      --text-heading:   #f8fafc;
      --text-station:   #f1f5f9;
      --text-muted:     #94a3b8;
      --text-dim:       #475569;
      --text-footer:    #334155;
      --text-price:     #4ade80;
      --text-error:     #f87171;
      --link:           #3b82f6;
      --accent:         #1d4ed8;
      --accent-hover:   #2563eb;
      --grid-line:      #1e2a3a;
      --handle:         #334155;
      --skeleton-a:     #252d3d;
      --skeleton-b:     #2d3748;
      --modal-overlay:  rgba(0,0,0,0.6);
    }

    @media (prefers-color-scheme: light) {
      :root:not([data-theme="dark"]) {
        --bg:             #f1f5f9;
        --bg-card:        #ffffff;
        --bg-card-error:  #fef2f2;
        --bg-row:         #f1f5f9;
        --bg-input:       #ffffff;
        --border:         #e2e8f0;
        --border-error:   #fca5a5;
        --border-input:   #cbd5e1;
        --text:           #1e293b;
        --text-heading:   #0f172a;
        --text-station:   #1e293b;
        --text-muted:     #64748b;
        --text-dim:       #94a3b8;
        --text-footer:    #94a3b8;
        --text-price:     #16a34a;
        --text-error:     #dc2626;
        --link:           #2563eb;
        --accent:         #2563eb;
        --accent-hover:   #1d4ed8;
        --grid-line:      #e2e8f0;
        --handle:         #cbd5e1;
        --skeleton-a:     #e2e8f0;
        --skeleton-b:     #cbd5e1;
        --modal-overlay:  rgba(0,0,0,0.3);
      }
    }

    [data-theme="light"] {
      --bg:             #f1f5f9;
      --bg-card:        #ffffff;
      --bg-card-error:  #fef2f2;
      --bg-row:         #f1f5f9;
      --bg-input:       #ffffff;
      --border:         #e2e8f0;
      --border-error:   #fca5a5;
      --border-input:   #cbd5e1;
      --text:           #1e293b;
      --text-heading:   #0f172a;
      --text-station:   #1e293b;
      --text-muted:     #64748b;
      --text-dim:       #94a3b8;
      --text-footer:    #94a3b8;
      --text-price:     #16a34a;
      --text-error:     #dc2626;
      --link:           #2563eb;
      --accent:         #2563eb;
      --accent-hover:   #1d4ed8;
      --grid-line:      #e2e8f0;
      --handle:         #cbd5e1;
      --skeleton-a:     #e2e8f0;
      --skeleton-b:     #cbd5e1;
      --modal-overlay:  rgba(0,0,0,0.3);
    }

    /* --- Base --- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    header {
      max-width: 1200px;
      margin: 0 auto 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    h1 { font-size: 1.6rem; font-weight: 700; color: var(--text-heading); }

    .meta { font-size: 0.8rem; color: var(--text-dim); display: flex; align-items: center; gap: 0.75rem; }
    .meta a { color: var(--link); text-decoration: none; }
    .meta a:hover { text-decoration: underline; }

    .btn-add {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.35rem 0.85rem;
      font-size: 0.82rem;
      cursor: pointer;
    }
    .btn-add:hover { background: var(--accent-hover); }

    .btn-theme {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 6px;
      padding: 0.3rem 0.6rem;
      font-size: 1rem;
      cursor: pointer;
      line-height: 1;
    }
    .btn-theme:hover { color: var(--text); border-color: var(--text-muted); }

    /* --- Modal --- */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--modal-overlay);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      width: 100%;
      max-width: 360px;
    }

    .modal h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: var(--text-station); }
    .modal label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.25rem; }

    .modal input {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border-input);
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      color: var(--text);
      font-size: 0.9rem;
      margin-bottom: 0.85rem;
    }
    .modal input:focus { outline: none; border-color: var(--link); }

    .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }

    .btn-cancel {
      background: transparent;
      border: 1px solid var(--border-input);
      color: var(--text-muted);
      border-radius: 6px;
      padding: 0.4rem 0.85rem;
      font-size: 0.82rem;
      cursor: pointer;
    }

    .btn-save {
      background: var(--accent);
      border: none;
      color: #fff;
      border-radius: 6px;
      padding: 0.4rem 0.85rem;
      font-size: 0.82rem;
      cursor: pointer;
    }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

    .modal-error {
      font-size: 0.78rem;
      color: var(--text-error);
      margin-bottom: 0.75rem;
      display: none;
    }

    /* --- Cards --- */
    .grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(440px, 1fr));
      gap: 1.25rem;
    }

    @media (max-width: 500px) {
      .grid { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
    }

    .card.error { border-color: var(--border-error); background: var(--bg-card-error); }

    .card-header {
      margin-bottom: 1rem;
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
    }

    .drag-handle {
      color: var(--handle);
      cursor: grab;
      font-size: 1rem;
      line-height: 1.3;
      flex-shrink: 0;
      user-select: none;
    }
    .drag-handle:active { cursor: grabbing; }

    .card-header-text { flex: 1; min-width: 0; }

    .station-name {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text-station);
      line-height: 1.3;
      cursor: pointer;
      border-radius: 4px;
      padding: 0.1rem 0.25rem;
      margin: -0.1rem -0.25rem;
    }
    .station-name:hover { background: var(--bg-row); }

    .station-name-input {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text-station);
      line-height: 1.3;
      background: var(--bg-input);
      border: 1px solid var(--link);
      border-radius: 4px;
      padding: 0.1rem 0.25rem;
      margin: -0.1rem -0.25rem;
      width: 100%;
      outline: none;
      font-family: inherit;
    }

    .cached-at {
      font-size: 0.72rem;
      color: var(--text-dim);
      margin-top: 0.15rem;
      min-height: 1em;
    }

    .btn-remove {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 1rem;
      cursor: pointer;
      line-height: 1;
      padding: 0;
      flex-shrink: 0;
    }
    .btn-remove:hover { color: var(--text-error); }

    .sortable-ghost { opacity: 0.3; }

    /* --- Skeleton --- */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }

    .skeleton {
      background: linear-gradient(90deg, var(--skeleton-a) 25%, var(--skeleton-b) 50%, var(--skeleton-a) 75%);
      background-size: 400px 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }

    .skeleton-row { height: 40px; margin-bottom: 0.5rem; }
    .skeleton-row:last-child { margin-bottom: 0; }

    /* --- Prices --- */
    .prices { display: flex; flex-direction: column; gap: 0.5rem; }

    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.45rem 0.75rem;
      background: var(--bg-row);
      border-radius: 8px;
    }

    .grade { font-size: 0.85rem; color: var(--text-muted); }

    .price-value {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text-price);
      font-variant-numeric: tabular-nums;
    }

    .no-prices { font-size: 0.85rem; color: var(--text-dim); padding: 0.5rem 0; }
    .error-msg { font-size: 0.85rem; color: var(--text-error); padding: 0.5rem 0; }

    /* --- Chart --- */
    .chart-wrap {
      margin-top: 1rem;
      padding-top: 1rem;
      padding-bottom: 0.5rem;
      border-top: 1px solid var(--border);
      height: 280px;
      position: relative;
    }

    .chart-days {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 0.6rem;
      justify-content: flex-end;
    }

    .chart-days button {
      background: var(--bg-row);
      border: 1px solid var(--border-input);
      color: var(--text-muted);
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      cursor: pointer;
    }

    .chart-days button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .chart-loading {
      font-size: 0.75rem;
      color: var(--text-dim);
      text-align: center;
      padding: 1rem 0;
    }

    footer {
      max-width: 1200px;
      margin: 2rem auto 0;
      font-size: 0.75rem;
      color: var(--text-footer);
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <h1>⛽ Local Gas Prices</h1>
  <div class="meta">
    Auto-refreshes every 5 min &nbsp;·&nbsp;
    <a href="/refresh">Force refresh</a>
    <button class="btn-add" onclick="openModal()">+ Add Station</button>
    <button class="btn-theme" id="btn-theme" onclick="toggleTheme()" title="Toggle theme"></button>
  </div>
</header>

<!-- Add station modal -->
<div class="modal-backdrop" id="modal" onclick="closeOnBackdrop(event)">
  <div class="modal">
    <h2>Add Station</h2>
    <div class="modal-error" id="modal-error"></div>
    <label for="inp-id">GasBuddy Station ID</label>
    <input id="inp-id" type="text" placeholder="e.g. 44946" inputmode="numeric" />
    <label for="inp-nick">Nickname</label>
    <input id="inp-nick" type="text" placeholder="e.g. Costco North" />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="btn-save" onclick="addStation()">Add</button>
    </div>
  </div>
</div>

<div class="grid" id="grid">
  {% for station in stations %}
  <div class="card" data-id="{{ station.id }}">
    <div class="card-header">
      <span class="drag-handle" title="Drag to reorder">⠿</span>
      <div class="card-header-text">
        <div class="station-name" onclick="startRename(this, '{{ station.id }}')" title="Click to rename">{{ station.nickname }}</div>
        <div class="cached-at" id="age-{{ station.id }}"></div>
      </div>
      <button class="btn-remove" title="Remove station" onclick="removeStation('{{ station.id }}', this)">✕</button>
    </div>

    <div id="prices-{{ station.id }}">
      <div class="skeleton skeleton-row"></div>
      <div class="skeleton skeleton-row"></div>
    </div>

    <div class="chart-wrap" id="chart-wrap-{{ station.id }}" style="display:none">
      <div class="chart-days">
        <button onclick="loadChart('{{ station.id }}', 1, this)">1d</button>
        <button onclick="loadChart('{{ station.id }}', 7, this)" class="active">7d</button>
        <button onclick="loadChart('{{ station.id }}', 30, this)">30d</button>
      </div>
      <div id="loading-{{ station.id }}" class="chart-loading">Loading history…</div>
      <canvas id="chart-{{ station.id }}" style="display:none"></canvas>
    </div>
  </div>
  {% endfor %}
</div>

<footer>
  Prices sourced from GasBuddy &nbsp;·&nbsp; Page auto-refreshes every 5 minutes
</footer>

<script>
const GRADE_COLORS = {
  Regular:  '#4ade80',
  Midgrade: '#facc15',
  Premium:  '#fb923c',
  Diesel:   '#60a5fa',
  E85:      '#c084fc',
};

const _charts = {};

function css(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

async function loadChart(stationId, days, btn) {
  btn.closest('.chart-days').querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const loading = document.getElementById(`loading-${stationId}`);
  const canvas  = document.getElementById(`chart-${stationId}`);

  loading.style.display = 'block';
  canvas.style.display  = 'none';

  let data;
  try {
    const res = await fetch(`/api/history/${stationId}?days=${days}`);
    data = await res.json();
  } catch {
    loading.textContent = 'Could not load history.';
    return;
  }

  const grades = Object.keys(data);
  if (!grades.length) {
    loading.textContent = 'No history yet — check back after prices are fetched.';
    return;
  }

  loading.style.display = 'none';
  canvas.style.display  = 'block';

  const tickColor = css('--text-dim');
  const gridColor = css('--grid-line');
  const legendColor = css('--text-muted');

  const datasets = grades.map(grade => ({
    label: grade,
    data: data[grade].map(p => ({ x: p.time, y: p.price })),
    borderColor: GRADE_COLORS[grade] || '#94a3b8',
    backgroundColor: 'transparent',
    borderWidth: 2,
    pointRadius: 2,
    tension: 0.3,
  }));

  if (_charts[stationId]) _charts[stationId].destroy();

  _charts[stationId] = new Chart(canvas, {
    type: 'line',
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'top',
          align: 'start',
          labels: { color: legendColor, boxWidth: 8, boxHeight: 8, padding: 8, font: { size: 10 } },
        },
        tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: $${ctx.parsed.y.toFixed(3)}` } },
      },
      scales: {
        x: {
          type: 'time',
          time: {
            tooltipFormat: 'MMM d, h:mm a',
            displayFormats: {
              minute: 'h:mm a',
              hour: 'h a',
              day: 'MMM d',
              week: 'MMM d',
              month: 'MMM',
            },
          },
          ticks: { color: tickColor, maxTicksLimit: 5, autoSkip: true, font: { size: 10 } },
          grid: { color: gridColor },
        },
        y: {
          grace: '5%',
          ticks: { color: tickColor, font: { size: 10 }, callback: v => '$' + v.toFixed(2) },
          grid: { color: gridColor },
        },
      },
    },
  });
}

function reloadAllCharts() {
  document.querySelectorAll('.chart-wrap').forEach(wrap => {
    if (wrap.style.display === 'none') return;
    const btn = wrap.querySelector('button.active');
    if (!btn) return;
    const stationId = wrap.id.replace('chart-wrap-', '');
    const days = parseInt(btn.textContent);
    loadChart(stationId, days, btn);
  });
}

// --- Prices ---
function formatAge(cachedAt) {
  const mins = Math.floor((Date.now() / 1000 - cachedAt) / 60);
  return mins < 1 ? 'Just updated' : `Updated ${mins} min ago`;
}

function renderPrices(stationId, data) {
  const card = document.querySelector(`[data-id="${stationId}"]`);
  const pricesEl = document.getElementById(`prices-${stationId}`);
  const ageEl    = document.getElementById(`age-${stationId}`);
  const wrapEl   = document.getElementById(`chart-wrap-${stationId}`);

  ageEl.textContent = formatAge(data.cached_at);

  if (data.error) {
    card.classList.add('error');
    pricesEl.innerHTML = '<div class="error-msg">Could not fetch prices — check station ID or network.</div>';
    return;
  }

  if (!data.prices.length) {
    pricesEl.innerHTML = '<div class="no-prices">No price data available.</div>';
    return;
  }

  pricesEl.innerHTML = '<div class="prices">' +
    data.prices.map(p =>
      `<div class="price-row">
        <span class="grade">${p.grade}</span>
        <span class="price-value">$${p.price.toFixed(3)}</span>
      </div>`
    ).join('') +
  '</div>';

  wrapEl.style.display = 'block';
  loadChart(stationId, 7, wrapEl.querySelector('button.active'));
}

async function loadAllPrices() {
  try {
    const res  = await fetch('/api/prices');
    const data = await res.json();
    Object.entries(data).forEach(([id, info]) => renderPrices(id, info));
  } catch (e) {
    document.querySelectorAll('.skeleton').forEach(el => {
      el.classList.remove('skeleton');
      el.textContent = 'Could not load prices.';
    });
  }
}

// --- Card ordering ---
const STORAGE_KEY = 'gas-prices-order';

function saveOrder() {
  const ids = [...document.querySelectorAll('.grid .card')].map(c => c.dataset.id);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(ids));
}

function applyOrder() {
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  if (!saved.length) return;
  const grid = document.getElementById('grid');
  saved.forEach(id => {
    const card = grid.querySelector(`[data-id="${id}"]`);
    if (card) grid.appendChild(card);
  });
}

// --- Rename ---
function startRename(el, stationId) {
  const current = el.textContent.trim();
  const input = document.createElement('input');
  input.className = 'station-name-input';
  input.value = current;
  el.replaceWith(input);
  input.focus();
  input.select();

  async function save() {
    const newName = input.value.trim() || current;
    const div = document.createElement('div');
    div.className = 'station-name';
    div.setAttribute('onclick', `startRename(this, '${stationId}')`);
    div.setAttribute('title', 'Click to rename');
    div.textContent = newName;
    input.replaceWith(div);

    if (newName !== current) {
      await fetch(`/api/stations/${stationId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nickname: newName }),
      });
    }
  }

  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = current; input.blur(); }
  });
}

// --- Theme ---
const THEME_KEY = 'gas-prices-theme';

function getEffectiveTheme() {
  const saved = localStorage.getItem(THEME_KEY);
  if (saved) return saved;
  return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
}

function applyThemeIcon() {
  const btn = document.getElementById('btn-theme');
  btn.textContent = getEffectiveTheme() === 'dark' ? '☀️' : '🌙';
}

function toggleTheme() {
  const current = getEffectiveTheme();
  const next = current === 'dark' ? 'light' : 'dark';
  localStorage.setItem(THEME_KEY, next);
  document.documentElement.setAttribute('data-theme', next);
  applyThemeIcon();
  reloadAllCharts();
}

// --- Modal ---
function openModal() {
  document.getElementById('inp-id').value = '';
  document.getElementById('inp-nick').value = '';
  document.getElementById('modal-error').style.display = 'none';
  document.getElementById('modal').classList.add('open');
  document.getElementById('inp-id').focus();
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function closeOnBackdrop(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

async function addStation() {
  const id    = document.getElementById('inp-id').value.trim();
  const nick  = document.getElementById('inp-nick').value.trim();
  const errEl = document.getElementById('modal-error');
  const saveBtn = document.getElementById('btn-save');

  errEl.style.display = 'none';
  if (!id) {
    errEl.textContent = 'Station ID is required.';
    errEl.style.display = 'block';
    return;
  }

  saveBtn.disabled = true;
  saveBtn.textContent = 'Adding…';

  try {
    const res  = await fetch('/api/stations', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, nickname: nick }),
    });
    const data = await res.json();
    if (!res.ok) {
      errEl.textContent = data.error || 'Something went wrong.';
      errEl.style.display = 'block';
      return;
    }
    closeModal();
    location.reload();
  } catch {
    errEl.textContent = 'Network error — try again.';
    errEl.style.display = 'block';
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = 'Add';
  }
}

async function removeStation(stationId, btn) {
  if (!confirm('Remove this station?')) return;
  const res = await fetch(`/api/stations/${stationId}`, { method: 'DELETE' });
  if (res.ok) {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    localStorage.setItem(STORAGE_KEY, JSON.stringify(saved.filter(id => id !== stationId)));
    btn.closest('.card').remove();
  }
}

document.addEventListener('DOMContentLoaded', () => {
  applyThemeIcon();
  applyOrder();

  Sortable.create(document.getElementById('grid'), {
    handle: '.drag-handle',
    animation: 150,
    ghostClass: 'sortable-ghost',
    onEnd: saveOrder,
  });

  loadAllPrices();
});
</script>
